<!doctype html>
<html>
	<head>
		<title>
			Zeus Messenger
		</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link href="assets/css/main.css" type="text/css" rel="stylesheet">
		<link rel="icon" href="assets/images/icon.png">
	</head>
	<body class="welcome">
		<script src="assets/js/zeus.js"></script>
		<section class="wontainer">
			<div class="skin">
                <span></span>
                <span></span>
			</div>
			<div class="jiji account loader">
					<div class="header">
						<span class="anonymous material-icons">
							sms
						</span>
						
						<div class="cin">
							<span id="account-info">Account - Sign Up</span>
						</div>
					</div>

					<form class="form" id="bob-main">
						<!--
						//DIV containing the returned info....
						<div class="error">Sorry something went wrong || Please fill all fields</div>
						-->
						<div class="fwrp input">
							<input required autocomplete="off"  name="user_name_" type="text" placeholder="Choose a username">
						</div>
						<div class="fwrp input">
							<input required autocomplete="off" name="email_" type="email" placeholder="Email @">
						</div>
						<div class="fwrp input">
							<select required name="var-gender">
								<optgroup label="-Choose a gender-">
									<option value="male">Male</option>
									<option value="female">Female</option>
								</optgroup>
							</select>
						</div>
						<div class="fwrp input">
							<input required autocomplete="off"  name="password_" type="password" placeholder="Choose a password">
						</div>
						<div class="fwrp input">
							<input required autocomplete="off"  name="repassword_" type="password" placeholder="Verify password">
						</div>
						<div class="fwrp sub"><button name="reg_user" class="btn-sub" type="submit">Register
						</button></div>
					</form>
					
					<script src="assets/js/cntrl_account.js"></script>
					<script>
					new accountBob("site-home.html");
					</script>
					
					
					<div class="quick-links">
						<a href="index.html">Homepage</a>
						&bull;
						<a href="site_login.html">Sign In</a> &bull;
						<a href="site-about.html">About</a>
					</div>
					<footer class="copyright">Zeus &copy; <script>document.write(new Date().getFullYear());</script></footer>
			</div>
			<div class="skin bottom">
                <span></span>
                <span></span>
			</div>
		</section>
		
	</body>
</html>
